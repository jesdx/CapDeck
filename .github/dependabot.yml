version: 2
updates:
  # Swift Package Manager dependencies (Sparkle drives the update chain, so
  # keeping it current is a security concern, not just maintenance).
  - package-ecosystem: swift
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    commit-message:
      prefix: build
    labels:
      - dependencies

  # GitHub Actions used by the CI workflow.
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    commit-message:
      prefix: ci
    labels:
      - dependencies
      - ci

name: Feature request
description: Suggest an idea or improvement for CapDeck
labels: [enhancement]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for the suggestion. CapDeck aims to stay a fast, local-first
        capture → clipboard → paste workflow, so please describe the problem you
        want solved, not only the feature.
  - type: textarea
    id: problem
    attributes:
      label: Problem or use case
      description: What are you trying to do, and where does CapDeck fall short today?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: How would you like it to work?
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches or workarounds you have tried.
    validations:
      required: false
